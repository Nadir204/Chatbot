



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBot — Login</title>
  <link rel="stylesheet" href="stylelogin.css">

  
 
</head>
<body>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <h1>ChatBot</h1>
    <p>Your intelligent AI assistant</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
    <button class="tab-btn"        onclick="showTab('register')">Create Account</button>
  </div>

  <!-- ── LOGIN FORM ─────────────────────────────────── -->
  <div class="form-section active" id="login-form">

    <div class="form-group">
      <label for="login-username">Username</label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input
                type="text"
                id="login-username"
                placeholder="Enter your username"
                oninput="clearFieldError('login-username', 'login-username-err')"
        />
      </div>
      <div class="field-error" id="login-username-err"></div>
    </div>

    <div class="form-group">
      <label for="login-password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                oninput="clearFieldError('login-password', 'login-password-err')"
                onkeydown="if(event.key==='Enter') doLogin()"
        />
        <button class="toggle-pw" type="button"
                onclick="togglePassword('login-password', this)">👁</button>
      </div>
      <div class="field-error" id="login-password-err"></div>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">
      <span class="btn-text">Sign In</span>
      <div class="spinner"></div>
    </button>
  </div>

  <!-- ── REGISTER FORM ──────────────────────────────── -->
  <div class="form-section" id="register-form">

    <div class="form-group">
      <label for="reg-username">Username</label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input
                type="text"
                id="reg-username"
                placeholder="Choose a username (min 3 chars)"
                oninput="validateRegUsername()"
                onkeydown="if(event.key==='Enter') doRegister()"
        />
      </div>
      <div class="field-error" id="reg-username-err"></div>
    </div>

    <div class="form-group">
      <label for="reg-password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input
                type="password"
                id="reg-password"
                placeholder="Choose a password (min 6 chars)"
                oninput="validateRegPassword()"
                onkeydown="if(event.key==='Enter') doRegister()"
        />
        <button class="toggle-pw" type="button"
                onclick="togglePassword('reg-password', this)">👁</button>
      </div>
      <div class="field-error" id="reg-password-err"></div>

      <!-- Password strength bar -->
      <div class="strength-bar-wrap" id="strength-wrap">
        <div class="strength-bar-track">
          <div class="strength-bar-fill" id="strength-fill"></div>
        </div>
        <span class="strength-label" id="strength-label">Strength: —</span>
      </div>

      <!-- Requirements checklist -->
      <div class="requirements" id="pw-requirements">
        <div class="req-item" id="req-length">
          <span class="dot"></span> At least 6 characters
        </div>
        <div class="req-item" id="req-letter">
          <span class="dot"></span> Contains a letter
        </div>
        <div class="req-item" id="req-number">
          <span class="dot"></span> Contains a number
        </div>
        <div class="req-item" id="req-special">
          <span class="dot"></span> Contains a special character (!@#$…)
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="reg-confirm">Confirm Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔑</span>
        <input
                type="password"
                id="reg-confirm"
                placeholder="Re-enter your password"
                oninput="validateConfirm()"
                onkeydown="if(event.key==='Enter') doRegister()"
        />
        <button class="toggle-pw" type="button"
                onclick="togglePassword('reg-confirm', this)">👁</button>
      </div>
      <div class="field-error" id="reg-confirm-err"></div>
    </div>

    <button class="btn" id="register-btn" onclick="doRegister()">
      <span class="btn-text">Create Account</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="card-footer">
   Devoloped by Nadir,Anonna,Rede
  </div>
</div>

   <script src="scriptlogin.js"></script>
</body>
</html>
